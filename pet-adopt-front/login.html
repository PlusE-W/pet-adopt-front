<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 宠物领养平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <header>
    <div class="nav">
      <div class="logo">🐾 爱心领养</div>
      <ul class="nav-menu">
        <li><a href="index.html">首页</a></li>
        <li><a href="login.html">登录</a></li>
        <li><a href="register.html">注册</a></li>
      </ul>
    </div>
  </header>

  <main>
    <div class="form-box">
      <h2>欢迎回来</h2>
      <form id="loginForm">
        <div class="form-item input-with-icon">
          <label>用户名</label>
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
          <div class="tip" id="usernameTip"></div>
        </div>
        
        <div class="form-item input-with-icon">
          <label>密码</label>
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
          <div class="tip" id="passwordTip"></div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="rememberMe">
            <span>记住我</span>
          </label>
          <a href="#" class="forgot-password">忘记密码？</a>
        </div>

        <div class="form-item">
          <button type="submit" class="btn" style="width:100%" id="loginBtn">
            <span>立即登录</span>
          </button>
        </div>
      </form>

      <div class="social-login">
        <p>或使用以下方式登录</p>
        <div class="social-buttons">
          <button class="social-btn" title="微信登录">💬</button>
          <button class="social-btn" title="QQ登录">🐧</button>
          <button class="social-btn" title="微博登录">📱</button>
        </div>
      </div>

      <div style="text-align:center;margin-top:2rem">
        还没有账号？<a href="register.html" style="color:#ff7f50;font-weight:600">立即注册</a>
      </div>

      <!-- 管理员入口 -->
      <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid #eee">
        <a href="#" id="adminLink" style="color:#999;font-size:0.85rem;text-decoration:none;transition:color 0.3s;">
          🔐 管理员入口
        </a>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const usernameTip = document.getElementById("usernameTip");
    const passwordTip = document.getElementById("passwordTip");
    const adminLink = document.getElementById("adminLink");

    // 管理员入口点击事件
    adminLink.addEventListener("click", (e) => {
      e.preventDefault();
      
      // 弹出输入框要求输入管理员密码
      const adminPassword = prompt("请输入管理员密码：");
      
      if (!adminPassword) {
        return; // 用户取消
      }
      
      // 这里设置管理员密码（实际项目中应该从后端验证）
      const correctAdminPassword = "admin123"; // 示例密码，实际应该更安全
      
      if (adminPassword === correctAdminPassword) {
        toast("验证成功，跳转到管理后台");
        
        // 保存管理员标记到 sessionStorage
        sessionStorage.setItem("isAdmin", "true");
        
        // 延迟跳转
        setTimeout(() => {
          location.href = "admin/pet-manage.html";
        }, 800);
      } else {
        toast("密码错误，无权访问", false);
      }
    });

    // 实时验证
    usernameInput.addEventListener("input", () => {
      if (usernameInput.value.length > 0 && usernameInput.value.length < 3) {
        usernameTip.innerText = "用户名至少3个字符";
        usernameInput.parentElement.classList.add("error");
        usernameInput.parentElement.classList.remove("success");
      } else if (usernameInput.value.length >= 3) {
        usernameTip.innerText = "";
        usernameInput.parentElement.classList.remove("error");
        usernameInput.parentElement.classList.add("success");
      } else {
        usernameTip.innerText = "";
        usernameInput.parentElement.classList.remove("error", "success");
      }
    });

    passwordInput.addEventListener("input", () => {
      if (passwordInput.value.length > 0 && passwordInput.value.length < 6) {
        passwordTip.innerText = "密码至少6个字符";
        passwordInput.parentElement.classList.add("error");
        passwordInput.parentElement.classList.remove("success");
      } else if (passwordInput.value.length >= 6) {
        passwordTip.innerText = "";
        passwordInput.parentElement.classList.remove("error");
        passwordInput.parentElement.classList.add("success");
      } else {
        passwordTip.innerText = "";
        passwordInput.parentElement.classList.remove("error", "success");
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      // 最终验证
      if (usernameInput.value.length < 3) {
        toast("用户名至少3个字符", false);
        usernameInput.focus();
        return;
      }
      
      if (passwordInput.value.length < 6) {
        toast("密码至少6个字符", false);
        passwordInput.focus();
        return;
      }

      // 显示加载状态
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="loading"></span> 登录中...';

      const data = {
        username: usernameInput.value,
        password: passwordInput.value
      };

      try {
        // 调用后端登录接口
        const res = await post("/user/login", data);
        
        if (res.code === 200) {
          toast("登录成功");
          
          // 保存用户信息到cookie
          document.cookie = "userId=" + res.data.id;
          document.cookie = "token=" + res.data.token;
          document.cookie = "role=" + res.data.role;
          
          // 如果勾选了记住我，设置较长的过期时间
          if (document.getElementById("rememberMe").checked) {
            const expiryDate = new Date();
            expiryDate.setDate(expiryDate.getDate() + 30);
            document.cookie = "userId=" + res.data.id + "; expires=" + expiryDate.toUTCString();
            document.cookie = "token=" + res.data.token + "; expires=" + expiryDate.toUTCString();
            document.cookie = "role=" + res.data.role + "; expires=" + expiryDate.toUTCString();
          }
          
          // 添加成功动画
          document.querySelector('.form-box').classList.add('success-animation');
          
          setTimeout(() => {
            location.href = "index.html";
          }, 800);
        } else {
          toast(res.msg, false);
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<span>立即登录</span>';
        }
      } catch (error) {
        toast("网络错误，请稍后重试", false);
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>立即登录</span>';
      }
    });
  </script>
</body>
</html>
