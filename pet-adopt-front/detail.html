<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宠物详情</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="nav">
      <div class="logo">爱心领养</div>
      <div class="nav-menu">
        <a href="index.html">首页</a>
        <a href="login.html">登录</a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="detail-box" id="detailBox">
      <!-- JS动态填充详情 -->
    </div>

    <div class="comment-box">
      <h3>留言评论 💬</h3>
      
      <div class="comment-input-area">
        <textarea id="commentContent" placeholder="写下你对毛孩子的祝福或提问..." maxlength="500"></textarea>
        <div class="char-counter"><span id="charCount">0</span>/500</div>
        <button class="btn comment-submit-btn" onclick="addComment()" id="submitCommentBtn">
          <span>📝 提交评论</span>
        </button>
      </div>

      <div id="commentList" class="comment-list">
        <!-- 评论列表将在这里动态渲染 -->
      </div>
    </div>
  </main>

  <footer>
    <p>© 2025 爱心领养平台 | 让每只毛孩子都有一个家</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    const petId = new URLSearchParams(location.search).get("id");
    let comments = [];

    // 渲染详情
    function renderDetail(pet) {
      document.getElementById("detailBox").innerHTML = `
        <img src="${pet.img || 'images/default.jpg'}" class="detail-img" alt="${pet.name}">
        <div class="detail-text">
          <h2>${pet.name}</h2>
          <p><strong>🐾 种类：</strong>${pet.type}</p>
          <p><strong>🎂 年龄：</strong>${pet.age}</p>
          <p><strong>❤️ 健康状况：</strong>${pet.health || "已打疫苗，健康活泼"}</p>
          <p><strong>📝 简介：</strong>${pet.intro || "一只温柔可爱的小宝贝，期待有爱心的你~"}</p>
          <p><strong>📌 状态：</strong><span class="pet-status ${pet.status}">${pet.status}</span></p>
          ${pet.status === '待领养' ? `<a href="apply.html?petId=${pet.id}" class="btn">申请领养</a>` : ''}
        </div>
      `;
    }

    // 获取头像首字母
    function getAvatarLetter(nickname) {
      return nickname ? nickname.charAt(0).toUpperCase() : '匿';
    }

    // 格式化时间
    function formatTime(dateStr) {
      if (!dateStr) return new Date().toLocaleString('zh-CN');
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;
      
      const minute = 60 * 1000;
      const hour = 60 * minute;
      const day = 24 * hour;

      if (diff < minute) {
        return '刚刚';
      } else if (diff < hour) {
        return Math.floor(diff / minute) + '分钟前';
      } else if (diff < day) {
        return Math.floor(diff / hour) + '小时前';
      } else if (diff < 7 * day) {
        return Math.floor(diff / day) + '天前';
      } else {
        return date.toLocaleDateString('zh-CN');
      }
    }

    // 渲染评论
    function renderComments(commentList) {
      if (!commentList || commentList.length === 0) {
        document.getElementById("commentList").innerHTML = `
          <div class="no-comments">
            <div class="no-comments-icon">💭</div>
            <p>暂无评论，快来抢沙发吧~</p>
          </div>
        `;
        return;
      }

      let html = "";
      commentList.forEach((comment, index) => {
        const likes = comment.likes || 0;
        const replies = comment.replies || [];
        
        html += `
        <div class="comment-item" data-comment-id="${comment.id}">
          <div class="comment-header">
            <div class="comment-author">
              <div class="avatar">${getAvatarLetter(comment.nickname)}</div>
              <div class="comment-author-info">
                <div class="comment-nickname">${comment.nickname || '匿名用户'}</div>
                <div class="comment-time">${formatTime(comment.createTime)}</div>
              </div>
            </div>
          </div>
          <div class="comment-content">${comment.content}</div>
          <div class="comment-actions">
            <button class="comment-action-btn ${comment.isLiked ? 'liked' : ''}" onclick="toggleLike(${index})">
              <span>${comment.isLiked ? '❤️' : '🤍'}</span>
              <span>${likes}</span>
            </button>
            <button class="comment-action-btn" onclick="showReplyForm(${index})">
              <span>💬</span>
              <span>回复</span>
            </button>
          </div>
          ${replies.length > 0 ? `
            <div class="reply-section">
              ${replies.map(reply => `
                <div class="reply-item">
                  <div class="reply-header">
                    <span class="reply-author">${reply.nickname || '匿名用户'}</span>
                    <span class="comment-time">${formatTime(reply.createTime)}</span>
                  </div>
                  <div class="reply-content">${reply.content}</div>
                </div>
              `).join('')}
            </div>
          ` : ''}
          <div id="reply-form-${index}" style="display:none;margin-left:3.2rem;margin-top:1rem;">
            <textarea id="reply-content-${index}" placeholder="回复 ${comment.nickname || '匿名用户'}..." style="width:100%;padding:0.8rem;border:2px solid #e8f5f0;border-radius:8px;min-height:60px;resize:vertical;"></textarea>
            <button class="btn" style="margin-top:0.5rem;padding:0.5rem 1.2rem;font-size:0.9rem;" onclick="submitReply(${index})">发送回复</button>
            <button style="margin-top:0.5rem;margin-left:0.5rem;padding:0.5rem 1.2rem;font-size:0.9rem;background:#f5f5f5;border:none;border-radius:20px;cursor:pointer;" onclick="hideReplyForm(${index})">取消</button>
          </div>
        </div>
        `;
      });
      document.getElementById("commentList").innerHTML = html;
    }

    // 显示回复表单
    function showReplyForm(index) {
      // 隐藏其他回复表单
      document.querySelectorAll('[id^="reply-form-"]').forEach(form => {
        form.style.display = 'none';
      });
      
      const replyForm = document.getElementById(`reply-form-${index}`);
      replyForm.style.display = 'block';
      document.getElementById(`reply-content-${index}`).focus();
    }

    // 隐藏回复表单
    function hideReplyForm(index) {
      document.getElementById(`reply-form-${index}`).style.display = 'none';
    }

    // 提交回复
    function submitReply(index) {
      const content = document.getElementById(`reply-content-${index}`).value.trim();
      if (!content) {
        alert("请输入回复内容");
        return;
      }

      const reply = {
        nickname: "当前用户",
        content: content,
        createTime: new Date().toISOString()
      };

      if (!comments[index].replies) {
        comments[index].replies = [];
      }
      comments[index].replies.push(reply);

      toast("回复成功");
      renderComments(comments);
    }

    // 点赞/取消点赞
    function toggleLike(index) {
      if (!comments[index].isLiked) {
        comments[index].likes = (comments[index].likes || 0) + 1;
        comments[index].isLiked = true;
      } else {
        comments[index].likes = (comments[index].likes || 1) - 1;
        comments[index].isLiked = false;
      }
      renderComments(comments);
    }

    // 字符计数
    const commentContent = document.getElementById("commentContent");
    const charCount = document.getElementById("charCount");
    
    commentContent.addEventListener("input", function() {
      const count = this.value.length;
      charCount.textContent = count;
      
      const counter = charCount.parentElement;
      counter.classList.remove("warning", "danger");
      
      if (count > 450) {
        counter.classList.add("danger");
      } else if (count > 400) {
        counter.classList.add("warning");
      }
    });

    // 添加评论
    function addComment() {
      const content = commentContent.value.trim();
      if (!content) {
        alert("请输入评论内容");
        return;
      }

      if (!checkLogin()) return;

      const submitBtn = document.getElementById("submitCommentBtn");
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span> 提交中...';

      const newComment = {
        id: Date.now(),
        nickname: "当前用户",
        content: content,
        createTime: new Date().toISOString(),
        likes: 0,
        isLiked: false,
        replies: []
      };

      // 模拟添加到评论列表
      comments.unshift(newComment);
      
      setTimeout(() => {
        toast("评论提交成功！");
        commentContent.value = "";
        charCount.textContent = "0";
        renderComments(comments);
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>📝 提交评论</span>';
      }, 500);
    }

    // 加载数据
    function loadPetDetail() {
      const pets = [
        {id:1, name:"橘猫", type:"猫", age:"1岁", img:"images/cat1.jpg", status:"待领养", health:"已打疫苗，已驱虫", intro:"性格温顺，亲人，喜欢蹭蹭~"},
        {id:2, name:"金毛", type:"狗", age:"2岁", img:"images/dog1.jpg", status:"待领养", health:"已打疫苗，健康活泼", intro:"温顺懂事，喜欢和人互动"},
        {id:3, name:"布偶", type:"猫", age:"8个月", img:"images/cat2.jpg", status:"已领养", health:"已打疫苗，已驱虫", intro:"颜值超高，性格软萌"}
      ];
      const pet = pets.find(p => p.id == petId);
      if (pet) renderDetail(pet);
    }

    function loadComments() {
      comments = [
        {
          id: 1,
          nickname: "爱心用户",
          content: "毛孩子好可爱，希望能找到温暖的家~",
          createTime: "2025-06-01 15:30",
          likes: 12,
          isLiked: false,
          replies: [
            {
              nickname: "爱宠人士",
              content: "是啊，看起来好乖！",
              createTime: "2025-06-01 16:00"
            }
          ]
        },
        {
          id: 2,
          nickname: "爱猫人士",
          content: "橘猫看起来好乖，希望有人领养它",
          createTime: "2025-06-01 16:00",
          likes: 8,
          isLiked: false,
          replies: []
        }
      ];
      renderComments(comments);
    }

    loadPetDetail();
    loadComments();
  </script>
</body>
</html>
