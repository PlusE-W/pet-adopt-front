<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增宠物</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="nav">
      <div class="logo">🐾 管理员后台</div>
      <ul class="nav-menu">
        <li><a href="pet-manage.html">宠物管理</a></li>
        <li><a href="../index.html">返回首页</a></li>
      </ul>
    </div>
  </header>

  <main class="container">
    <div class="form-box">
      <h2>新增宠物信息</h2>
      <form id="addPetForm">
        <div class="form-item">
          <label for="name">宠物名称</label>
          <input type="text" id="name" placeholder="请输入宠物名称" required>
        </div>
        <div class="form-item">
          <label for="type">宠物种类</label>
          <select id="type" required>
            <option value="">请选择种类</option>
            <option value="猫">猫咪</option>
            <option value="狗">狗狗</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="form-item">
          <label for="age">年龄</label>
          <input type="text" id="age" placeholder="例如：1岁、6个月" required>
        </div>
        <div class="form-item">
          <label for="image">图片路径</label>
          <input type="text" id="image" placeholder="例：/upload/cat1.jpg" required>
          <small>填写 /upload/ 开头的相对路径，如：/upload/cat1.jpg</small>
        </div>
        <div class="form-item">
          <label for="health">健康状况</label>
          <input type="text" id="health" placeholder="例如：已打疫苗，健康活泼">
        </div>
        <div class="form-item">
          <label for="intro">简介</label>
          <textarea id="intro" placeholder="宠物简介"></textarea>
        </div>
        <div class="form-item">
          <label for="status">状态</label>
          <select id="status" required>
            <option value="待领养">待领养</option>
            <option value="已领养">已领养</option>
          </select>
        </div>
        <div class="form-item">
          <button type="submit" class="btn" style="width:100%" id="submitBtn">提交</button>
        </div>
      </form>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script>
    window.onload = async function(){
      const isAdmin = await checkAdmin();
      if(!isAdmin) return;
    };

    document.getElementById("addPetForm").addEventListener("submit",async function(e){
      e.preventDefault();
      const submitBtn = document.getElementById("submitBtn");

      const name = document.getElementById("name").value.trim();
      const type = document.getElementById("type").value;
      const age = document.getElementById("age").value.trim();
      const image = document.getElementById("image").value.trim();

      if (!name) {
        toast("请填写宠物名称", false);
        return;
      }
      if (!type) {
        toast("请选择宠物种类", false);
        return;
      }
      if (!age) {
        toast("请填写宠物年龄", false);
        return;
      }
      if (!image || !image.startsWith("/upload/")) {
        toast("图片路径必须以 /upload/ 开头，如：/upload/cat1.jpg", false);
        return;
      }

      const data = {
        name: name,
        species: type,
        age: age,
        image: image,
        health: document.getElementById("health").value.trim(),
        description: document.getElementById("intro").value.trim(),
        status: document.getElementById("status").value
      };

      try{
        submitBtn.disabled = true;
        submitBtn.innerHTML = "提交中...";

        await post("/api/admin/pet/add", data);
        toast("新增成功");
        setTimeout(()=>{
          location.href = "pet-manage.html";
        },1200);
      }catch(err){
        toast(err.message || "新增失败", false);
      }finally{
        submitBtn.disabled = false;
        submitBtn.innerHTML = "提交";
      }
    });
  </script>
</body>
</html>
