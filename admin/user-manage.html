<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 管理员后台</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid #eee; }
    .admin-menu { margin: 1rem 0; }
    .admin-menu a { margin-right: 1rem; padding: 0.5rem 1rem; background: #ff7f50; color: white; border-radius: 4px; text-decoration: none; }
    .table-box { margin: 2rem 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #eee; padding: 0.8rem; text-align: center; }
    th { background: #f8f8f8; }
    .btn { padding: 0.4rem 0.8rem; border: none; border-radius: 4px; cursor: pointer; }
    .btn-edit { background: #409eff; color: #fff; }
    .btn-del { background: #f56c6c; color: #fff; }
  </style>
</head>
<body>
  <div class="admin-header">
    <h1>🐾 宠物领养平台 - 用户管理</h1>
    <button class="btn" onclick="logout()">退出登录</button>
  </div>

  <div class="container">
    <div class="admin-menu">
      <a href="pet-manage.html">宠物管理</a>
      <a href="user-manage.html" style="background:#333">用户管理</a>
      <a href="comment-manage.html">评论管理</a>
    </div>

    <div class="table-box">
      <h2>全部用户列表</h2>
      <table id="userTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>密码</th>
            <th>角色(0普通/1管理员)</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="5">加载中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    window.onload = async function () {
      // 管理员权限校验
      if (!checkAdminAuth()) return;
      // 加载用户数据
      await loadUserList();
    };

    // 校验登录+管理员身份
    function checkAdminAuth() {
      const isLogin = sessionStorage.getItem("isLogin");
      const isAdmin = sessionStorage.getItem("isAdmin");
      if (isLogin !== "true" || isAdmin !== "true") {
        alert("无权限访问，请先登录管理员账号");
        location.href = "../login.html";
        return false;
      }
      return true;
    }

    // 加载数据库用户数据
    async function loadUserList() {
      try {
        const res = await get("/api/user/list");
        const userList = res.data || [];
        const tbody = document.querySelector("#userTable tbody");

        if (userList.length === 0) {
          tbody.innerHTML = "<tr><td colspan='5'>暂无用户数据</td></tr>";
          return;
        }

        let html = "";
        userList.forEach(user => {
          html += `
            <tr>
              <td>${user.id}</td>
              <td>${user.account}</td>
              <td>${user.password}</td>
              <td>${user.role === 1 ? "管理员" : "普通用户"}</td>
              <td>
                <button class="btn btn-edit" onclick="editUser(${user.id})">编辑</button>
                <button class="btn btn-del" onclick="deleteUser(${user.id})">删除</button>
              </td>
            </tr>
          `;
        });
        tbody.innerHTML = html;
      } catch (err) {
        console.error(err);
        document.querySelector("#userTable tbody").innerHTML = "<tr><td colspan='5'>数据加载失败</td></tr>";
      }
    }

    // 编辑用户（简易弹窗）
    function editUser(id) {
      alert("编辑用户 ID：" + id);
      // 可自行扩展编辑弹窗逻辑
    }

    // 删除用户
    async function deleteUser(id) {
      if (!confirm("确定要删除该用户吗？")) return;
      try {
        await del(`/api/user/${id}`);
        toast("删除成功");
        loadUserList();
      } catch (err) {
        toast("删除失败", false);
      }
    }

    // 退出登录
    function logout() {
      sessionStorage.removeItem("isLogin");
      sessionStorage.removeItem("isAdmin");
      location.href = "../login.html";
    }
  </script>
</body>
</html>
