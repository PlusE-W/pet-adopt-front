<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 后台</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="nav">
      <div class="logo">🐾 管理员后台</div>
      <ul class="nav-menu">
        <li><a href="pet-manage.html">宠物管理</a></li>
        <li><a href="apply-manage.html">申请管理</a></li>
        <li><a href="user-manage.html">用户管理</a></li>
        <li><a href="comment-manage.html">评论管理</a></li>
        <li><a href="../index.html">返回首页</a></li>
      </ul>
    </div>
  </header>

  <main class="container">
    <div class="table-box">
      <h2>用户列表</h2>
      <table>
        <thead>
          <tr>
            <th>用户ID</th>
            <th>用户名</th>
            <th>昵称</th>
            <th>手机号</th>
            <th>角色</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="userTable">
          <!-- 动态渲染 -->
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script>
    // 管理员权限验证
    (function() {
      const isAdmin = sessionStorage.getItem("isAdmin");
      if (!isAdmin || isAdmin !== "true") {
        alert("无权访问，请先通过管理员入口登录！");
        location.href = "../login.html";
        return;
      }
    })();

    // 渲染用户列表
    function renderTable(list) {
      let html = "";
      list.forEach(user=>{
        html += `
        <tr>
          <td>${user.id}</td>
          <td>${user.username}</td>
          <td>${user.nickname}</td>
          <td>${user.phone}</td>
          <td>${user.role === 'admin' ? '管理员' : '普通用户'}</td>
          <td>${user.status}</td>
          <td>
            <button class="btn" onclick="toggleUser(${user.id})">${user.status === '正常' ? '禁用' : '启用'}</button>
          </td>
        </tr>
        `;
      });
      document.getElementById("userTable").innerHTML = html;
    }

    // 调用后端接口获取用户列表
    async function loadUsers() {
      const res = await get("/user/list");
      if(res.code === 200){
        renderTable(res.data);
      }
    }

    // 启用/禁用用户
    async function toggleUser(id) {
      if(!confirm("确定要修改该用户状态吗？")) return;
      const res = await put(`/user/toggle?id=${id}`);
      if(res.code === 200){
        toast("操作成功");
        loadUsers();
      }else{
        toast(res.msg, false);
      }
    }

    // 页面加载时调用
    loadUsers();
  </script>
</body>
</html>
